name: Deploy backend to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy through SSM
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      AWS_INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID }}
      BACKEND_APP_USER: ${{ vars.BACKEND_APP_USER || 'ubuntu' }}
      BACKEND_APP_DIR: ${{ vars.BACKEND_APP_DIR || '/home/ubuntu/proy_ia_backend' }}
      BACKEND_VENV_DIR: ${{ vars.BACKEND_VENV_DIR || '/home/ubuntu/proy_ia_backend/.venv' }}
      BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'proy-ia-backend.service' }}
      BACKEND_LOCAL_HEALTH_URL: ${{ vars.BACKEND_LOCAL_HEALTH_URL || 'http://127.0.0.1:8000/ping' }}
      PUBLIC_HEALTH_URL: ${{ vars.PUBLIC_HEALTH_URL || 'https://api.afcrseguridad.com/ping' }}
    steps:
      - name: Validate deployment configuration
        shell: bash
        run: |
          : "${AWS_REGION:?Configure AWS_REGION in the production environment variables}"
          : "${AWS_ROLE_TO_ASSUME:?Configure AWS_ROLE_TO_ASSUME in the production environment variables}"
          : "${AWS_INSTANCE_ID:?Configure AWS_INSTANCE_ID in the production environment variables}"

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: afcr-backend-production
          mask-aws-account-id: true

      - name: Deploy on EC2 through Systems Manager
        shell: bash
        run: |
          set -Eeuo pipefail
          REMOTE_COMMAND="set -Eeuo pipefail; test -d '${BACKEND_APP_DIR}/.git'; test -f '${BACKEND_APP_DIR}/.env'; runuser -u '${BACKEND_APP_USER}' -- git -C '${BACKEND_APP_DIR}' fetch origin main; runuser -u '${BACKEND_APP_USER}' -- git -C '${BACKEND_APP_DIR}' checkout main; runuser -u '${BACKEND_APP_USER}' -- git -C '${BACKEND_APP_DIR}' merge --ff-only origin/main; BACKEND_APP_USER='${BACKEND_APP_USER}' BACKEND_APP_DIR='${BACKEND_APP_DIR}' BACKEND_VENV_DIR='${BACKEND_VENV_DIR}' BACKEND_SERVICE_NAME='${BACKEND_SERVICE_NAME}' BACKEND_LOCAL_HEALTH_URL='${BACKEND_LOCAL_HEALTH_URL}' bash '${BACKEND_APP_DIR}/scripts/deploy-ec2.sh'"
          PARAMETERS="$(jq -cn --arg command "${REMOTE_COMMAND}" '{commands:[$command]}')"
          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${AWS_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy proy_ia_backend/main" \
            --parameters "${PARAMETERS}" \
            --query 'Command.CommandId' \
            --output text)"

          if ! aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${AWS_INSTANCE_ID}"; then
            aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${AWS_INSTANCE_ID}" --output table || true
            exit 1
          fi

          STATUS="$(aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${AWS_INSTANCE_ID}" --query 'Status' --output text)"
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${AWS_INSTANCE_ID}" --query '[StandardOutputContent,StandardErrorContent]' --output text
          test "${STATUS}" = "Success"

      - name: Verify public API health
        shell: bash
        run: curl --fail --silent --show-error --retry 5 --retry-delay 3 "${PUBLIC_HEALTH_URL}"
